<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Time Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            font-weight: 700;
            letter-spacing: -1px;
            margin-bottom: 40px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 24px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px -10px rgba(56, 189, 248, 0.2);
        }

        .city-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .time-display {
            font-size: 2.2rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin: 12px 0 8px 0;
            font-family: 'Inter', monospace;
        }

        .timezone-tag {
            display: inline-block;
            font-size: 0.75rem;
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            font-weight: 600;
        }

        .live-dot {
            height: 8px;
            width: 8px;
            background-color: #10b981;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        .btn-back { 
            display: inline-block;
            margin-top: 30px;
            text-decoration: none; 
            color: rgba(255, 255, 255, 0.6); 
            font-size: 0.9rem;
            transition: 0.3s;
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn { 
            display: block; 
            width: 220px; 
            padding: 15px; 
            margin: 15px auto;
            text-decoration: none; 
            color: white; 
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px; 
            font-weight: bold;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover { 
            background: white; 
            color: #1e3c72;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <h1>🌍 World Clock</h1>

    <div class="grid">
        {{range .}}
        <div class="card" data-offset="{{.Offset}}">
            <div class="city-name">{{.Name}}</div>
            <div class="time-display">{{.Time}}</div>
            <div class="timezone-tag">
                <span class="live-dot"></span>{{.TimeZone}} (UTC {{if gt .Offset 0}}+{{end}}{{.Offset}})
            </div>
        </div>
        {{end}}
    </div>
    
    <script>
        function updateClocks() {
            const now = new Date();
            const utc = now.getTime() + (now.getTimezoneOffset() * 60000);

            document.querySelectorAll('.card').forEach(card => {
                const offset = parseFloat(card.dataset.offset);
                const cityTime = new Date(utc + (3600000 * offset));
                
                const timeStr = cityTime.toLocaleTimeString('ru-RU', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit',
                    hour12: false
                });

                const timeDisplay = card.querySelector('.time-display');
                if (timeDisplay) {
                    timeDisplay.textContent = timeStr;
                }
            });
        }

        setInterval(updateClocks, 1000);
        document.addEventListener('DOMContentLoaded', updateClocks);
    </script>

    <a href="/" class="btn-back">← Назад в меню</a>
</body>
</html>
