<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Time — Dashboard</title>
    <style>
        /* Анимированный градиент на фоне */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(-45deg, #1e3c72, #2a5298, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            color: white;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Эффект матового стекла для контейнера */
        .menu-container { 
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px 60px; 
            border-radius: 20px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
        }

        h1 { 
            margin-bottom: 10px; 
            font-weight: 300; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        p { 
            opacity: 0.8; 
            margin-bottom: 30px; 
            font-size: 0.9em;
        }

        /* Стильные кнопки с неоновым эффектом при наведении */
        .btn { 
            display: block; 
            width: 220px; 
            padding: 15px; 
            margin: 15px auto;
            text-decoration: none; 
            color: white; 
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px; 
            font-weight: bold;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover { 
            background: white; 
            color: #1e3c72;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(-1px);
        }
        .icon { margin-right: 8px; }
    </style>
</head>
<body>
    <div class="menu-container">
        <h1>World Time</h1>
        <p>Система точного времени</p>
        
        <a href="/time_now" class="btn">
            <span class="icon">🕒</span> Текущее время
        </a>
        
        <a href="/city_time" class="btn">
            <span class="icon">🌍</span> Время в городах
        </a>
    </div>
</body>
</html>
